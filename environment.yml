# Reproducible environment for stablecoin-abm.
#   conda env create -f environment.yml && conda activate stablesim
# (mirrors the CI install; Python 3.11 is the tested version)
name: stablesim
channels:
  - conda-forge
dependencies:
  - python=3.11
  - pip
  - pip:
      - -r requirements.txt   # numpy/pandas/scipy/sklearn/statsmodels/gymnasium/sb3/torch/...
      - -e .
